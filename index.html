<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Partito Democratico Cesena</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --green:#00843d;
    --green2:#00a651;
    --red:#e31e24;
    --dark:#1f2937;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    /* Rimosso overflow:hidden per permettere lo scroll su mobile */
    overflow-y: auto;
    overflow-x: hidden;

    background:
        radial-gradient(circle at top left,#00a65155,transparent 35%),
        radial-gradient(circle at bottom right,#e31e2455,transparent 35%),
        linear-gradient(135deg,#f8fafc,#eef2f7);
}

.bg-circle{
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
    z-index:0;
}

.circle1{
    width:350px;
    height:350px;
    background:#00a65140;
    top:-100px;
    left:-100px;
}

.circle2{
    width:300px;
    height:300px;
    background:#e31e2440;
    right:-80px;
    bottom:-80px;
}

.wrapper{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
    position:relative;
    z-index:1;
}

.card{
    width:100%;
    max-width:500px;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.6);
    border-radius:32px;
    padding:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.12);
    animation:appear .8s ease;
}

/* Miglioramento per schermi piccoli */
@media (max-width: 500px) {
    .card {
        padding: 25px;
    }
}

.logo-box{
    width:130px;
    height:130px;
    margin:auto;
    margin-bottom:25px;
    border-radius:50%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.logo-box img{
    width:95px;
    border-radius: 50%;
}

.badge{
    display:inline-block;
    padding:8px 16px;
    border-radius:999px;
    background:#e8f8ef;
    color:var(--green);
    font-size:.85rem;
    font-weight:600;
    margin-bottom:18px;
}

.header{
    text-align:center;
}

h1{
    font-size:2.1rem;
    color:var(--dark);
    font-weight:800;
}

.subtitle{
    margin-top:12px;
    color:#6b7280;
    line-height:1.7;
}

.buttons{
    margin-top:35px;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:white;
    height:62px;
    border-radius:18px;
    font-weight:600;
    margin-bottom:14px;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-4px);
}

.instagram{ background:linear-gradient(135deg, #833AB4, #FD1D1D, #FCAF45); }
.facebook{ background:#1877F2; }
.whatsapp{ background:#25D366; }
.website{ background:linear-gradient(135deg, var(--green), var(--green2)); }

.info{
    margin-top:30px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.info-box{
    background:white;
    border-radius:16px;
    padding:14px;
    text-align:center;
}

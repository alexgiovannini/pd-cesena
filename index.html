<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Partito Democratico Cesena</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --green:#00843d;
    --green2:#00a651;
    --red:#e31e24;
    --dark:#1f2937;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow:hidden;

    background:
        radial-gradient(circle at top left,#00a65155,transparent 35%),
        radial-gradient(circle at bottom right,#e31e2455,transparent 35%),
        linear-gradient(135deg,#f8fafc,#eef2f7);
}

.bg-circle{
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
    z-index:0;
}

.circle1{
    width:350px;
    height:350px;
    background:#00a65140;
    top:-100px;
    left:-100px;
}

.circle2{
    width:300px;
    height:300px;
    background:#e31e2440;
    right:-80px;
    bottom:-80px;
}

.wrapper{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
    position:relative;
    z-index:1;
}

.card{
    width:100%;
    max-width:500px;

    background:rgba(255,255,255,.75);
    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,.6);

    border-radius:32px;

    padding:40px;

    box-shadow:
        0 20px 50px rgba(0,0,0,.12);

    animation:appear .8s ease;
}

.logo-box{
    width:130px;
    height:130px;

    margin:auto;
    margin-bottom:25px;

    border-radius:50%;

    background:white;

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:
        0 10px 30px rgba(0,0,0,.08);
}

.logo-box img{
    width:95px;
}

.badge{
    display:inline-block;

    padding:8px 16px;

    border-radius:999px;

    background:#e8f8ef;
    color:var(--green);

    font-size:.85rem;
    font-weight:600;

    margin-bottom:18px;
}

.header{
    text-align:center;
}

h1{
    font-size:2.1rem;
    color:var(--dark);
    font-weight:800;
}

.subtitle{
    margin-top:12px;
    color:#6b7280;
    line-height:1.7;
}

.buttons{
    margin-top:35px;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;

    text-decoration:none;
    color:white;

    height:62px;

    border-radius:18px;

    font-weight:600;

    margin-bottom:14px;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-4px);
}

.instagram{
    background:linear-gradient(
    135deg,
    #833AB4,
    #FD1D1D,
    #FCAF45);
}

.facebook{
    background:#1877F2;
}

.whatsapp{
    background:#25D366;
}

.website{
    background:linear-gradient(
    135deg,
    var(--green),
    var(--green2));
}

.info{
    margin-top:30px;

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.info-box{
    background:white;
    border-radius:16px;
    padding:14px;
    text-align:center;
}

.info-box span{
    display:block;
    font-size:.8rem;
    color:#6b7280;
}

.info-box strong{
    color:var(--dark);
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#6b7280;
    font-size:.85rem;
}

@keyframes appear{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:none;
    }
}

</style>
</head>
<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<div class="wrapper">

<div class="card">

    <div class="header">

        <div class="logo-box">
            <img src="https://scontent.fmil1-1.fna.fbcdn.net/v/t39.30808-6/253881059_10159232025982420_4618632007813878452_n.jpg?stp=dst-jpg_tt6&cstp=mx1000x1000&ctp=s1000x1000&_nc_cat=104&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=8NBLF9gm-BEQ7kNvwE8uwkv&_nc_oc=Adp2p8qfcYBetBVVKW9RlSS76JAHHEvma3xHXrWrFw2LPHospIPM-G3VR9jLz0c1qgE&_nc_zt=23&_nc_ht=scontent.fmil1-1.fna&_nc_gid=dfdE4i8iBMcjxHBdZTGcSw&_nc_ss=7c289&oh=00_Af9iVyhGfgtZQpvDtoqePwLL7qiO3GSbJoTamb-m85IRKg&oe=6A2CB5C2" alt="">
        </div>

        <div class="badge">
            Comunità • Partecipazione • Territorio
        </div>

        <h1>Partito Democratico Cesena</h1>

        <p class="subtitle">
            Segui le attività del PD Cesena,
            resta aggiornato sugli eventi e partecipa
            alla vita politica del territorio.
        </p>

    </div>

    <div class="buttons">

        <a href="https://www.instagram.com/pdcesena/" class="btn instagram">
            Instagram
        </a>

        <a href="https://www.facebook.com/PdCesena" class="btn facebook">
            Facebook
        </a>

        <a href="#" class="btn whatsapp">
            Canale WhatsApp
        </a>

        <a href="https://www.pdcesena.it/" class="btn website">
            Sito Web
        </a>

    </div>

    <div class="info">

        <div class="info-box">
            <span>Sede</span>
            <strong>Cesena</strong>
        </div>

        <div class="info-box">
            <span>Contatti</span>
            <strong>0547 21368</strong>
        </div>

    </div>

    <div class="footer">
        Viale Giovanni Bovio 48 • Cesena
    </div>

</div>

</div>

</body>
</html>
